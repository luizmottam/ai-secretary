services:

  # ===========================================
  # OpenClaw - AI Agent Gateway
  # ===========================================
  openclaw:
    image: node:22-slim
    container_name: openclaw-gateway

    working_dir: /app

    volumes:
      - openclaw-data:/root/.openclaw
      - ./workspace:/app/workspace
      - ./config/openclaw.json:/app/openclaw.json:ro

    environment:
      # Groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${GROQ_API_KEY}
      - OPENAI_BASE_URL=https://api.groq.com/openai/v1

      # Ollama
      - OLLAMA_HOST=http://ollama:11434

      # n8n
      - N8N_WEBHOOK_BASE=http://n8n:5678/webhook

      # Gateway
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}

    command: >
      sh -c "
      npm install -g openclaw &&
      openclaw gateway --bind lan --allow-unconfigured
      "

    ports:
      - "18789:18789"

    depends_on:
      - ollama
      - n8n

    restart: unless-stopped

    networks:
      - ai-stack

  # ===========================================
  # Ollama
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    restart: unless-stopped

    networks:
      - ai-stack

    # Se possuir GPU NVIDIA, descomente:
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities:
    #             - gpu

  # ===========================================
  # n8n
  # ===========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-workflows

    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows:/home/node/workflows

    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}

      - GENERIC_TIMEZONE=${TIMEZONE:-America/Sao_Paulo}

      # Login
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}

      # Groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${GROQ_API_KEY}

    ports:
      - "5678:5678"

    restart: unless-stopped

    networks:
      - ai-stack

# ===========================================
# Volumes
# ===========================================
volumes:

  openclaw-data:
    name: ai-secretary_openclaw-data

  ollama-data:
    name: ai-secretary_ollama-data

  n8n-data:
    name: ai-secretary_n8n-data

# ===========================================
# Network
# ===========================================
networks:

  ai-stack:
    driver: bridge