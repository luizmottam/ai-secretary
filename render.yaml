services:

  # ===========================================
  # n8n - Workflow Automation
  # ===========================================
  - type: web
    name: ai-secretary-n8n
    runtime: docker
    dockerfilePath: ./Dockerfile.n8n
    plan: starter
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        sync: false  # Set to: https://ai-secretary-n8n.onrender.com
      - key: GENERIC_TIMEZONE
        value: America/Sao_Paulo
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      # PostgreSQL
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: ai-secretary-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: ai-secretary-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: ai-secretary-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: ai-secretary-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: ai-secretary-db
          property: password
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
    healthCheckPath: /healthz

databases:
  - name: ai-secretary-db
    plan: free  # troca para basic se precisar de produção
